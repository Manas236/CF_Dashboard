<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Newsband Analytics</title>
  <!-- match the dashboard: set theme before first paint to avoid a flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("dash-theme");
        if (t === "light" || t === "dark")
          document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth-page">
    <div class="auth-bg" aria-hidden="true"></div>

    <button class="theme-toggle auth-theme-toggle" id="theme-toggle" type="button"
            aria-label="Toggle light / dark theme" title="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
      </svg>
    </button>

    <main class="auth-card">
      <div class="auth-brand">
        <span class="auth-mark"></span>
        <div class="auth-brand-text">
          <div class="auth-brand-name">Newsband</div>
          <div class="auth-brand-sub">Newsroom Analytics</div>
        </div>
      </div>

      <h1 class="auth-title">Sign in</h1>
      <p class="auth-lead">Enter your credentials to access the dashboard.</p>

      {% if error %}
        <div class="auth-error" role="alert">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span>{{ error }}</span>
        </div>
      {% endif %}

      <form class="auth-form" method="post" action="{{ url_for('auth.login') }}" novalidate>
        {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}">{% endif %}

        <label class="auth-field">
          <span class="auth-label">Username</span>
          <input class="auth-input" type="text" name="username" autocomplete="username"
                 autocapitalize="none" autocorrect="off" spellcheck="false" autofocus required>
        </label>

        <label class="auth-field">
          <span class="auth-label">Password</span>
          <input class="auth-input" type="password" name="password"
                 autocomplete="current-password" required>
        </label>

        <button class="auth-btn" type="submit">Sign in</button>
      </form>

      <div class="auth-foot">Cloudflare GraphQL · Free plan · Protected area</div>
    </main>
  </div>

  <script>
    // self-contained theme toggle (the dashboard's common.js isn't loaded here)
    (function () {
      var btn = document.getElementById("theme-toggle");
      if (!btn) return;
      btn.addEventListener("click", function () {
        var root = document.documentElement;
        var next = (root.getAttribute("data-theme") || "dark") === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", next);
        try { localStorage.setItem("dash-theme", next); } catch (e) {}
      });
    })();
  </script>
</body>
</html>
